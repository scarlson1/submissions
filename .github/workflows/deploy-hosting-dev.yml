name: Firebase Hosting Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch: # "Run workflow" button in the Actions tab

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build common
        run: pnpm --filter @idemand/common build

      - name: Build client
        run: pnpm --filter client build:dev
        # env:
        # Add any env vars your Vite build needs, e.g.:
        # VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY_DEV }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID_DEV }}
          entryPoint: . # directory containing firebase.json
          channelId: live
