name: Test Functions

on:
  pull_request:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'common/**'
      - 'turbo.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - 'common/**'

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @idemand/common
        run: pnpm --filter @idemand/common build

      - name: Run unit tests
        run: pnpm --filter functions test:unit

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functions-coverage
          path: functions/coverage/
          retention-days: 14

  integration-tests:
    name: Integration Tests (Firestore Emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Java 21 (required by Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Firebase emulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}
          restore-keys: firebase-emulators-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @idemand/common
        run: pnpm --filter @idemand/common build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Run integration tests against Firestore emulator
        run: |
          firebase emulators:exec \
            --only firestore,auth \
            --project test-project \
            "pnpm --filter functions test:integration"
        env:
          # No real Firebase project needed — emulators run in isolation
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
